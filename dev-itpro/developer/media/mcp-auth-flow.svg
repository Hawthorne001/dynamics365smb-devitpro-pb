<svg xmlns="http://www.w3.org/2000/svg" xmlns:svg="http://www.w3.org/2000/svg" id="svg23" width="905" height="527" aria-label="Business Central MCP authentication sequence using PRM and OAuth 2.0 Authorization Code with PKCE" role="img" version="1.1" viewBox="0 0 905 527"><style id="style1">text{font-family:Segoe UI,Arial,sans-serif;font-size:14px;fill:#242424}.title{font-size:16px;font-weight:600}.line{stroke:#8a8886;stroke-width:1}.arrow{stroke:#0078d4;stroke-width:1.6;fill:none;marker-end:url(#arrowhead)}.dashed{stroke-dasharray:6,4}.step{font-weight:600}.endpoint,.subtle{font-size:12px}.subtle{fill:#605e5c}.endpoint{fill:#323130}</style><defs id="defs1"><marker id="arrowhead" markerHeight="7" markerWidth="10" orient="auto" refX="9.5" refY="3.5"><polygon id="polygon1" fill="#0078d4" points="0 7 0 0 10 3.5"/></marker></defs><text id="text1" x="436.067" y="15.807" class="title" text-anchor="middle">Business Central MCP authentication flow</text><text id="text2" x="436.067" y="35.807" class="subtle" text-anchor="middle">401 challenge, PRM discovery, OAuth 2.0 Authorization Code with PKCE</text><text id="text3" x="36.067" y="75.807" text-anchor="middle">MCP client</text><text id="text4" x="306.067" y="75.807" text-anchor="middle">MCP server</text><text id="text5" x="306.067" y="95.807" class="endpoint" text-anchor="middle">https://mcp.businesscentral.dynamics.com</text><text id="text6" x="576.067" y="75.807" text-anchor="middle">PRM endpoint</text><text id="text7" x="576.067" y="95.807" class="subtle" text-anchor="middle">/.well-known/protected-resource-metadata</text><text id="text8" x="846.067" y="75.807" text-anchor="middle">Microsoft Entra ID</text><line id="line8" x1="36.067" x2="36.067" y1="113.807" y2="523.807" class="line"/><line id="line9" x1="306.067" x2="306.067" y1="113.807" y2="523.807" class="line"/><line id="line10" x1="576.067" x2="576.067" y1="113.807" y2="523.807" class="line"/><line id="line11" x1="846.067" x2="846.067" y1="113.807" y2="523.807" class="line"/><path id="path11" d="M 36.067298,143.80652 H 306.0673" class="arrow"/><text id="text11" x="171.067" y="131.807" text-anchor="middle"><tspan id="tspan11" class="step">1.</tspan> Unauthenticated request</text><path id="path12" d="M 306.0673,183.80652 H 36.067298" class="arrow dashed"/><text id="text12" x="171.067" y="171.807" text-anchor="middle"><tspan id="tspan12" class="step">2.</tspan> 401 Unauthorized</text><text id="text13" x="169.911" y="197.012" class="subtle" text-anchor="middle">WWW-Authenticate → PRM</text><path id="path13" d="M 36.067298,228.80652 H 576.0673" class="arrow"/><text id="text14" x="288.717" y="223.855" text-anchor="middle"><tspan id="tspan13" class="step">3.</tspan> Retrieve PRM document</text><path id="path14" d="M 576.0673,268.80652 H 36.067298" class="arrow dashed"/><text id="text15" x="306.067" y="259.807" text-anchor="middle">PRM response</text><text id="text16" x="306.067" y="279.807" class="subtle" text-anchor="middle">Identifies Microsoft Entra ID as authorization server</text><path id="path16" d="M 36.067298,318.80652 H 846.0673" class="arrow"/><text id="text17" x="441.067" y="308.807" text-anchor="middle"><tspan id="tspan16" class="step">4.</tspan> Authorization request (OAuth 2.0 + PKCE)</text><text id="text18" x="439.911" y="329.963" class="subtle" text-anchor="middle">code_challenge, user sign-in</text><path id="path18" d="M 846.0673,358.80652 H 36.067298" class="arrow dashed"/><text id="text19" x="441.067" y="348.807" text-anchor="middle">Authorization code</text><path id="path19" d="M 36.067298,398.80652 H 846.0673" class="arrow"/><text id="text20" x="441.067" y="388.807" text-anchor="middle">Token request (code + code_verifier)</text><path id="path20" d="M 846.0673,438.80652 H 36.067298" class="arrow dashed"/><text id="text21" x="441.067" y="428.807" text-anchor="middle">Access token</text><path id="path21" d="M 36.067298,478.80652 H 306.0673" class="arrow"/><text id="text22" x="171.067" y="468.807" text-anchor="middle"><tspan id="tspan21" class="step">5.</tspan> Authorized requests</text><text id="text23" x="171.067" y="489.963" class="subtle" text-anchor="middle">Authorization: Bearer &lt;access_token&gt;</text></svg>